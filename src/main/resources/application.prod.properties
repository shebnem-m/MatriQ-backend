spring.application.name=MatriQ-backend

# PostgreSQL Connection Settings using Environment Variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Driver and Dialect Setup
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate DDL and SQL Logging Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Deferred Initialization for data.sql to run after table generation
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Server
server.port=8080

# CORS - prod frontend
frontend.allowed-origins=${FRONTEND_ALLOWED_ORIGINS}